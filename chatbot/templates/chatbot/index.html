{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPU UMS - AI Assistant</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        /* ROOT */
        html,
        body {
            height: 100%;
            width: 100%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* BODY */
        body {
            font-family: 'Roboto', sans-serif;
            background: #f1f4f9;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* MOBILE SAFE HEIGHT */
        @supports (height: 100dvh) {
            body {
                height: 100dvh;
            }
        }

        /* HEADER */
        .ums-header {
            background: #fff;
            height: 60px;
            flex-shrink: 0;

            display: flex;
            align-items: center;
            justify-content: space-between;

            padding: 0 15px;
            border-bottom: 4px solid #f47920;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ums-logo-text {
            font-size: 24px;
            font-weight: 800;
        }

        .ums-logo-text span {
            color: #f47920;
        }

        .title-container {
            display: flex;
            flex-direction: column;
            border-left: 1px solid #ddd;
            padding-left: 10px;
        }

        .top-title {
            font-weight: 700;
            font-size: 14px;
        }

        .sub-text {
            font-size: 10px;
            color: #666;
        }

        .logout-btn {
            border: 1px solid #f47920;
            color: #f47920;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* MAIN */
        .main-container {
            flex: 1;
            display: flex;
            padding: 10px;
            overflow: hidden;
        }

        /* CHAT FULL WIDTH */
        .chat-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;

            background: white;
            border-radius: 20px;
        }

        /* HEADER */
        .card-header {
            padding: 12px 20px;
            border-bottom: 1px solid #eee;
            font-weight: 600;
        }

        /* CHAT AREA */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            min-height: 0;

            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* MESSAGES */
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.5;
        }

        .user-message {
            background: #f47920;
            color: white;
            align-self: flex-end;
        }

        .bot-message {
            background: #f5f5f5;
            align-self: flex-start;
        }

        /* INPUT */
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 10px;
            border-top: 1px solid #eee;
        }

        .input-wrapper {
            flex: 1;
            background: #f5f7fa;
            border-radius: 25px;
            padding: 0 15px;
            display: flex;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            height: 40px;
            font-size: 14px;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f47920;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .main-container {
                padding: 0;
            }

            .chat-card {
                border-radius: 0;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="ums-header">
        <div class="logo-section">
            <img src="{% static 'images/lpu_logo.png' %}" style="height:40px;">
            <div class="ums-logo-text"><span>U</span>MS</div>

            <div class="title-container">
                <span class="top-title">UNIVERSITY MANAGEMENT SYSTEM</span>
                <span class="sub-text">AI ASSISTANT PORTAL</span>
            </div>
        </div>

        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button class="logout-btn">Logout</button>
        </form>
    </div>

    <!-- MAIN -->
    <div class="main-container">

        <div class="chat-card">

            <div class="card-header">
                LPU CHATBOT ● ONLINE
            </div>

            <div id="chatMessages" class="chat-messages">
                <div class="message bot-message">
                    <strong>JARVIS:</strong> Hello! Ask me about admissions, fees, courses, placements, hostel, or
                    exams.
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input id="chatInput" class="chat-input" placeholder="Ask anything about LPU..."
                        onkeydown="if(event.key==='Enter') sendMessage()">
                </div>

                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>

        </div>

    </div>

    <script>
        let chatHistory = [];

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const question = input.value.trim();
            if (!question) return;

            addMessage(question, 'user');
            input.value = '';

            const container = document.getElementById('chatMessages');

            const botDiv = document.createElement('div');
            botDiv.className = 'message bot-message';
            botDiv.innerHTML = "<em>Thinking...</em>";
            container.appendChild(botDiv);

            container.scrollTop = container.scrollHeight;

            try {
                const res = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: question,
                        chat_history: chatHistory
                    })
                });

                const data = await res.json();
                const answer = data.answer || "No response";

                chatHistory.push({ role: 'user', content: question });
                chatHistory.push({ role: 'assistant', content: answer });

                botDiv.innerHTML = marked.parse(answer);

            } catch (err) {
                botDiv.innerHTML = "Error. Try again.";
            }

            container.scrollTop = container.scrollHeight;
        }

        function addMessage(text, type) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');

            div.className = 'message ' + type + '-message';
            div.textContent = text;

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>

</body>

</html>
